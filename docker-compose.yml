services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mapa_astral
      POSTGRES_PASSWORD: mapa_astral
      POSTGRES_DB: mapa_astral
    ports:
      - "5432:5432"
    volumes:
      - mapa_astral_db_data:/var/lib/postgresql/data

volumes:
  mapa_astral_db_data:
